<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1395" />
  <title>Mapas macro — TradingView</title>
  <link rel="stylesheet" href="../styles/tv-tokens.css" />
  <link rel="stylesheet" href="../styles/figma-icon-replacements.css" />
  <link rel="stylesheet" href="../src/shared/shared-ui.css" />
  <link rel="stylesheet" href="./page.css" />
</head>
<body data-active-link="mas">
  <div class="tv-header"></div>
  <main class="page-macro">
    <header class="page-macro__header">
      <h1 id="macro-maps">Mapas macro</h1>
      <div class="page-macro__top-controls">
        <button class="ghost-icon-btn" title="Captura" aria-label="Captura">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        </button>
        <button class="ghost-icon-btn" title="Pantalla completa" aria-label="Pantalla completa">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9V3h6M21 9V3h-6M3 15v6h6M21 15v6h-6"/></svg>
        </button>
      </div>
    </header>

    <nav class="page-macro__tabs" role="radiogroup" aria-label="Indicador macro">
      <button class="page-macro__tab-icon" aria-label="Buscar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      </button>
      <button class="page-macro__tab is-active" role="radio" aria-checked="true">Tasa de inflación</button>
      <button class="page-macro__tab" role="radio" aria-checked="false">Tipo de interés</button>
      <button class="page-macro__tab" role="radio" aria-checked="false">PIB</button>
      <button class="page-macro__tab" role="radio" aria-checked="false">Tasa de desempleo</button>
      <button class="page-macro__tab" role="radio" aria-checked="false">Deuda pública/PIB</button>
    </nav>

    <section class="page-macro__body">
      <div class="page-macro__map">
        <div class="page-macro__map-frame">
          <object class="page-macro__map-svg" type="image/svg+xml" data="./world-map.svg" aria-label="Mapa mundial"></object>
          <div class="page-macro__map-controls">
            <button class="map-zoom-btn" aria-label="Acercar">+</button>
            <button class="map-zoom-btn" aria-label="Alejar">−</button>
            <button class="map-zoom-btn" aria-label="Pantalla completa">⛶</button>
          </div>
        </div>

        <div class="page-macro__legend">
          <div class="page-macro__legend-bar"></div>
          <div class="page-macro__legend-ticks">
            <span>3%</span><span>4%</span><span>6%</span><span>10%</span><span>30%</span>
          </div>
        </div>

        <div class="page-macro__time-slider">
          <div class="page-macro__time-bar"></div>
          <div class="page-macro__time-thumb"></div>
          <div class="page-macro__time-marks">
            <span>Dic 1914</span><span>Oct 1942</span><span>Sep 1970</span><span>Jul 1998</span><span>Mayo 2026</span>
          </div>
        </div>
      </div>

      <aside class="page-macro__sidebar">
        <button class="g20-dropdown">G20 <span aria-hidden="true">▾</span></button>
        <div class="g20-headers">
          <span>País</span>
          <span>Valor / Observación</span>
        </div>
        <ul class="g20-list" id="g20-list"></ul>
      </aside>
    </section>
  </main>
  <div class="layout__area--right"></div>

  <script type="module">
    import { renderNavbar } from '../src/shared/navbar.js';
    import { renderSidebar } from '../src/shared/sidebar.js';
    import { substituteIcons } from '../src/shared/figma-icons.js';
    import { FLAGS } from './flags.js';

    const COUNTRIES = [
      { iso:'AR', name:'Argentina', ticker:'ARIRYY', rate:'32.4%', date:'Abr 2026' },
      { iso:'TR', name:'Turquía', ticker:'TRIRYY', rate:'32.37%', date:'Abr 2026' },
      { iso:'RU', name:'Rusia', ticker:'RUIRYY', rate:'5.6%', date:'Abr 2026' },
      { iso:'AU', name:'Australia', ticker:'AUIRYY', rate:'4.6%', date:'Mar 2026' },
      { iso:'MX', name:'México', ticker:'MXIRYY', rate:'4.45%', date:'Abr 2026' },
      { iso:'BR', name:'Brasil', ticker:'BRIRYY', rate:'4.29%', date:'Abr 2026' },
      { iso:'ZA', name:'Sudáfrica', ticker:'ZAIRYY', rate:'4%', date:'Abr 2026' },
      { iso:'US', name:'EE. UU.', ticker:'USIRYY', rate:'3.8%', date:'Abr 2026' },
      { iso:'IN', name:'India', ticker:'INIRYY', rate:'3.48%', date:'Abr 2026' },
      { iso:'DE', name:'Alemania', ticker:'DEIRYY', rate:'3.6%', date:'Abr 2026' },
      { iso:'CA', name:'Canadá', ticker:'CAIRYY', rate:'2.9%', date:'Abr 2026' },
      { iso:'GB', name:'Reino Unido', ticker:'GBIRYY', rate:'2.8%', date:'Abr 2026' },
      { iso:'IT', name:'Italia', ticker:'ITIRYY', rate:'2.7%', date:'Abr 2026' },
      { iso:'KR', name:'Corea del Sur', ticker:'KRIRYY', rate:'2.5%', date:'Abr 2026' },
      { iso:'ID', name:'Indonesia', ticker:'IDIRYY', rate:'2.43%', date:'Abr 2026' },
      { iso:'FR', name:'Francia', ticker:'FRIRYY', rate:'2.2%', date:'Abr 2026' },
      { iso:'SA', name:'Arabia Saudí', ticker:'SAIRYY', rate:'1.7%', date:'Abr 2026' },
      { iso:'JP', name:'Japón', ticker:'JPIRYY', rate:'1.4%', date:'Abr 2026' },
      { iso:'CN', name:'China continental', ticker:'CNIRYY', rate:'1.2%', date:'Abr 2026' },
    ];

    document.getElementById('g20-list').innerHTML = COUNTRIES.map(c => `
      <li class="g20-card">
        <div class="g20-card__flag" aria-hidden="true">${FLAGS[c.iso] || '🏳'}</div>
        <div class="g20-card__info">
          <div class="g20-card__name">${c.name}</div>
          <div class="g20-card__ticker">${c.ticker}</div>
        </div>
        <div class="g20-card__value">
          <div class="g20-card__rate">${c.rate}</div>
          <div class="g20-card__date">${c.date}</div>
        </div>
      </li>
    `).join('');

    document.querySelectorAll('.tv-header').forEach(el => el.outerHTML = renderNavbar({ activeLink: 'mas' }));
    document.querySelectorAll('.layout__area--right').forEach(el => el.outerHTML = renderSidebar());
    substituteIcons();
  </script>
</body>
</html>
